<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio Tree Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 4v16M6 10l6-6 6 6M6 18l6-4 6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <p class="eyebrow">Investment Portfolio</p>
          <h1>Portfolio Tree Explorer</h1>
        </div>
      </div>

      <form id="upload-form" class="upload-form">
        <div class="upload-copy">
          <span class="upload-label">Import dataset</span>
          <span class="upload-hint">CSV, XLSX, or ODS</span>
        </div>
        <div class="file-picker">
          <button type="button" id="choose-file" class="btn-secondary">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M10 3v10M6 9l4-4 4 4M4 14v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Choose File
          </button>
          <span id="file-name" class="file-name">No file chosen</span>
          <input
            id="file-input"
            name="file"
            type="file"
            accept=".ods,.csv,.xlsx,.xls"
            hidden
          >
        </div>
        <button type="submit" class="btn-primary">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M10 3v10M6 9l4-4 4 4M4 14h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Upload
        </button>
      </form>
    </header>

    <main class="layout">
      <section class="tree-card">
        <div class="toolbar">
          <div class="dataset-info">
            <span class="dataset-badge">Active dataset</span>
            <strong id="dataset-name">Loading...</strong>
            <span id="dataset-meta"></span>
          </div>
          <div class="legend" aria-label="Tree legend">
            <span class="legend-pill branch-pill"><i class="dot branch"></i> Branch</span>
            <span class="legend-pill leaf-pill"><i class="dot leaf"></i> Portfolio</span>
          </div>
        </div>
        <div class="tree-nav" aria-label="Tree navigation controls">
          <div class="search-box">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M9 15a6 6 0 100-12 6 6 0 000 12zM14 14l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <input id="tree-search" type="search" placeholder="Search ticker or name">
            <span id="search-count">0 matches</span>
          </div>
          <div class="nav-actions">
            <button type="button" id="expand-selected" class="btn-secondary small" disabled>Expand children</button>
            <button type="button" id="collapse-selected" class="btn-secondary small" disabled>Collapse children</button>
            <button type="button" id="expand-all" class="btn-secondary small">Expand all</button>
            <button type="button" id="collapse-all" class="btn-secondary small">Collapse all</button>
            <button type="button" id="focus-selected" class="btn-secondary small">Focus selected</button>
            <button type="button" id="reset-view" class="btn-secondary small">Reset view</button>
          </div>
        </div>
        <div id="message" class="message" role="status"></div>
        <div id="tree" class="tree-canvas"></div>
      </section>

      <aside class="details-card">
        <div class="details-header">
          <div class="details-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
              <path d="M12 11v5M12 8h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h2>Selected Node</h2>
            <p class="details-subtitle">Inspect and edit the live tree</p>
          </div>
        </div>
        <div id="details" class="details-body">
          <div class="empty-state">
            <span class="empty-icon">◎</span>
            <p>Select a portfolio or branch in the tree</p>
          </div>
        </div>
      </aside>
    </main>

    <div id="tooltip" class="tooltip" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="{{ url_for('static', filename='tree.js') }}"></script>
  </body>
</html>
